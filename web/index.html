<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>

  <header>
    <div class="logo-row">
      <div id="status-dot" class="status-dot"></div>
      <span class="logo-name">Ronny</span>
      <span class="logo-tag">Personal AI Assistant</span>
    </div>
  </header>

  <main>
    <div class="sphere-scene">
      <div class="sphere-glow"></div>
      <div id="sphere" class="idle" role="img" aria-label="Assistant state"></div>
      <div class="sphere-ring"></div>
      <div class="sphere-gloss"></div>
    </div>

    <div id="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <p id="status-label">Hold Space or tap to speak</p>

    <!-- Disappearing caption — shown when agent speaks -->
    <div id="caption-box" aria-live="polite" aria-atomic="true"></div>

    <!-- Controls -->
    <div id="controls">
      <button id="conv-btn" aria-label="Start conversation mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <circle cx="12" cy="19" r="3"/>
        </svg>
        <span id="conv-label">Start conversation</span>
      </button>

      <div id="text-row">
        <input id="text-input" type="text" placeholder="Type a message…" autocomplete="off" aria-label="Type a message">
        <button id="send-btn" aria-label="Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Slide-up order confirmation bar -->
  <div id="order-bar" role="dialog" aria-label="Confirm order" aria-hidden="true">
    <div id="order-bar-inner">
      <div id="order-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span id="order-bar-text">Order ready · COD</span>
      </div>
      <div id="order-bar-actions">
        <button id="order-cancel-btn" aria-label="Cancel order">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <button id="order-confirm-btn">Accept</button>
      </div>
    </div>
    <div id="order-bar-timer"></div>
  </div>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
