<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronny — Personal AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <span class="logo">Ronny</span>
      <span class="tagline">Personal AI Assistant</span>
    </header>

    <div id="sphere-container">
      <div id="sphere" class="idle"></div>
      <p id="status-label">Hold Space or tap to speak</p>
    </div>

    <div id="chat-panel">
      <div id="messages"></div>
    </div>

    <div id="controls">
      <button id="ptt-btn" aria-label="Push to talk">&#x1F3A4; Hold to Talk</button>
      <div id="text-row">
        <input id="text-input" type="text" placeholder="Or type a message…" autocomplete="off">
        <button id="send-btn" aria-label="Send">Send</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
